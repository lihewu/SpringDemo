<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>最简单的 SpringBoot Demo - 加法计算器</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            padding: 50px;
            text-align: center;
        }
        .calc-box {
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            display: inline-block;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        input {
            padding: 10px;
            font-size: 16px;
            width: 80px;
            margin: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        #result-box {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
            color: #28a745;
        }
    </style>
</head>
<body>

<div class="calc-box">
    <h2>🧮 异步加法计算器</h2>
    <input type="number" id="num1" placeholder="整数 1">
    <span> + </span>
    <input type="number" id="num2" placeholder="整数 2">

    <button onclick="doCalculate()">点击相加</button>

    <div id="result-box"></div>
</div>

<script>
    function doCalculate() {
        // 1. 获取输入框的值
        const n1 = document.getElementById("num1").value;
        const n2 = document.getElementById("num2").value;

        // 表单简单校验
        if (n1 === "" || n2 === "") {
            alert("请先输入两个整数！");
            return;
        }

        // 2. 使用 GET 方式异步请求后端接口，将参数拼接到 URL 后面
        // 实际请求路径：http://localhost:8080/calc/add?num1=X&num2=Y
        fetch(`/calc/add?num1=${n1}&num2=${n2}`)
            .then(response => {
                if (!response.ok) {
                    throw new Error("网络错误或服务器崩溃");
                }
                return response.json(); // 3. 告诉系统我们要把拿到的结果解析为 JSON 大盒子
            })
            .then(res => {
                // 4. 解析后端标准 Result 盒子的数据并显示到网页上
                if (res.code === 200) {
                    document.getElementById("result-box").innerText = "计算结果: " + res.data;
                } else {
                    document.getElementById("result-box").innerText = "错误: " + res.message;
                }
            })
            .catch(error => {
                document.getElementById("result-box").innerText = "请求失败: " + error.message;
            });
    }
</script>

</body>
</html>
